name: mobile
description: "Campus Gigs - Student gig marketplace for Cameroonian universities"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^13.2.5
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.69.2
  image_picker: ^1.1.2
  socket_io_client: ^2.0.3
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.4
  intl: ^0.20.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
